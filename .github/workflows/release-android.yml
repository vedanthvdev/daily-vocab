name: Release Android (Play internal)

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate content catalogs
        run: npm run content:validate:strict

  android-internal:
    name: android-internal
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Require EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing GitHub Actions secret EXPO_TOKEN. See docs/ci-cd.md."
            exit 1
          fi

      - name: EAS Build + Submit (production → Play internal)
        run: npx eas-cli@21.0.2 build -p android --profile production --non-interactive --auto-submit --no-wait
